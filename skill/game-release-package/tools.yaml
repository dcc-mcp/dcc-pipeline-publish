tools:
  - name: package_prebuilt_game_release
    description: >-
      Package a complete prebuilt Windows game directory for distribution.
      Use after Unreal, Unity, or Godot has exported the playable build.
      Choose installer for a Setup executable, steam for SteamPipe preview files,
      or wegame for a local submission preflight record.
    source_file: scripts/package_prebuilt_game_release.py
    execution: async
    affinity: any
    timeout_hint_secs: 3600
    enforce_thread_affinity: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false
    input_schema:
      type: object
      required: [source_directory, executable_relative_path, output_directory, release_profile]
      properties:
        source_directory:
          type: string
          minLength: 1
          description: Complete exported Windows game directory.
        executable_relative_path:
          type: string
          minLength: 1
          description: Main game executable relative to source_directory.
        output_directory:
          type: string
          minLength: 1
          description: Separate directory that receives release artifacts.
        release_profile:
          type: string
          enum: [installer, steam, wegame]
        product_name:
          type: string
          default: ""
          description: Product display name; defaults to the executable stem.
        product_version:
          type: string
          default: "1.0.0"
        publisher:
          type: string
          default: ""
          description: Publisher display name; defaults to product_name.
        installer_compiler_path:
          type: string
          default: ""
          description: Optional Inno Setup 6 ISCC executable; auto-detected when omitted.
        vc_redist_path:
          type: string
          default: ""
          description: Optional Microsoft Visual C++ x64 redistributable bundled by the installer profile.
        steam_app_id:
          type: string
          default: ""
          description: Numeric Steam AppID required by the steam profile.
        steam_depot_id:
          type: string
          default: ""
          description: Numeric Steam DepotID required by the steam profile.
    output_schema:
      type: object
      required: [success, message, context]
      additionalProperties: true
    call_examples:
      - arguments:
          source_directory: "D:/Builds/MyGame-Win64"
          executable_relative_path: "MyGame.exe"
          output_directory: "D:/Releases/MyGame-Installer"
          release_profile: installer
          product_name: My Game
          product_version: 1.0.0
        note: Create a standalone Windows Setup executable from any supported engine export.
      - arguments:
          source_directory: "D:/Builds/MyGame-Win64"
          executable_relative_path: "MyGame.exe"
          output_directory: "D:/Releases/MyGame-Steam"
          release_profile: steam
          steam_app_id: "123456"
          steam_depot_id: "123457"
        note: Create preview-only SteamPipe scripts without uploading content.
    next-tools:
      on-failure: [dcc_diagnostics__audit_log]
