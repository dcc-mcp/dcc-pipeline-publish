tools:
  - name: create_publish_manifest
    description: Hash exported files and write an immutable publish handoff manifest.
    source_file: scripts/create_publish_manifest.py
    execution: sync
    affinity: any
    timeout_hint_secs: 120
    enforce_thread_affinity: true
    annotations: {read_only_hint: false, destructive_hint: false, idempotent_hint: false}
    input_schema:
      type: object
      required: [output_path, project, entity_type, entity_name, version, files]
      properties:
        output_path: {type: string}
        project: {type: string, minLength: 1}
        entity_type: {type: string, enum: [Asset, Shot, Sequence, Episode, Level]}
        entity_name: {type: string, minLength: 1}
        task: {type: string}
        version: {type: integer, minimum: 1}
        files:
          type: array
          minItems: 1
          items:
            type: object
            required: [path, role]
            properties:
              path: {type: string}
              role: {type: string, enum: [scene, usd, cache, texture, material, preview, render, package]}
        render_job_id: {type: string}
    output_schema: {type: object}

  - name: validate_publish_manifest
    description: Validate a publish manifest and verify every recorded file hash.
    source_file: scripts/validate_publish_manifest.py
    execution: sync
    affinity: any
    timeout_hint_secs: 120
    enforce_thread_affinity: true
    annotations: {read_only_hint: true, idempotent_hint: true}
    input_schema:
      type: object
      required: [manifest_path]
      properties:
        manifest_path: {type: string}
    output_schema: {type: object}

